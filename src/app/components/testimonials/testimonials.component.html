<section class="testimonials">
  <div class="container">

    <div class="testimonials__header">
      <span class="section-label">Prova social</span>
      <h2 class="section-title">O que dizem quem já chamou o Cleiton</h2>
    </div>

    <div class="testimonials__grid">
      @for (item of testimonials; track item.name) {
        <article class="testimonials__card">
          <div class="testimonials__quote">"</div>
          <div class="testimonials__stars">⭐⭐⭐⭐⭐</div>
          <p class="testimonials__text">{{ item.text }}</p>
          <div class="testimonials__author">
            <div class="testimonials__avatar">{{ item.initial }}</div>
            <div>
              <div class="testimonials__name">{{ item.name }}</div>
              <div class="testimonials__service">{{ item.service }}</div>
            </div>
          </div>
        </article>
      }
    </div>

  </div>
</section>
